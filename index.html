<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>www.magneto.com - Custom Search Engine</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Syne:wght@500;700;800&family=Manrope:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="aurora aurora-1" aria-hidden="true"></div>
    <div class="aurora aurora-2" aria-hidden="true"></div>
    <div class="grid-overlay" aria-hidden="true"></div>

    <main class="page-shell home-layout">
      <aside class="side-panel weather-panel" aria-label="Local weather status">
        <div class="weather-row">
          <span id="weatherIcon" class="weather-icon" aria-hidden="true"
            >&#9729;</span
          >
          <div>
            <p id="weatherTemp" class="weather-temp">--&#176;C</p>
            <p id="weatherSummary" class="weather-summary">
              Loading weather...
            </p>
          </div>
        </div>
        <p id="weatherLocation" class="weather-location">
          Detecting GPS location.
        </p>
        <div
          id="weatherForecast"
          class="weather-forecast"
          aria-label="7 day weather forecast"
        ></div>
      </aside>

      <section class="center-panel" aria-label="MAGNETO search">
        <h1>Magneto</h1>

        <section class="search-panel" aria-label="Search form">
          <form id="searchForm" class="search-form">
            <label for="searchQuery" class="sr-only"
              >What do you want to search?</label
            >
            <input
              id="searchQuery"
              name="q"
              type="search"
              placeholder="Type your search"
              list="quickSuggestions"
              required
            />
            <datalist id="quickSuggestions">
              <option value="technology news 2026"></option>
              <option value="top web design trends"></option>
              <option value="free javascript courses"></option>
              <option value="best laptops 2026"></option>
            </datalist>

            <button type="submit" class="search-btn">Search Now</button>
          </form>

          <p id="statusMessage" class="status" aria-live="polite">
            Enter a term and press Enter.
          </p>
          <p class="hint">MAGNETO Core runs your own controlled search flow.</p>

          <div class="quick-tags" aria-label="Popular searches">
            <button class="tag" type="button" data-query="weather tomorrow">
              #weather
            </button>
            <button class="tag" type="button" data-query="latest sport news">
              #sports
            </button>
            <button class="tag" type="button" data-query="4k wallpapers">
              #wallpapers
            </button>
            <button class="tag" type="button" data-query="healthy recipes">
              #food
            </button>
          </div>

          <p class="admin-entry">
            Need control panel access?
            <a href="admin.html" class="admin-link">Open Admin Dashboard</a>
          </p>
        </section>
      </section>

      <aside
        class="side-panel right-panel"
        aria-label="MAGNETO suggestion assistant"
      >
        <p class="badge">MAGNETO Assistant</p>
        <h2>Suggestion Chat</h2>
        <div
          id="assistantThread"
          class="assistant-thread"
          aria-live="polite"
        ></div>

        <form id="assistantForm" class="assistant-form">
          <label for="assistantInput" class="sr-only"
            >Write a message to the assistant</label
          >
          <input
            id="assistantInput"
            type="text"
            placeholder="Ask MAGNETO what to search..."
            maxlength="160"
            autocomplete="off"
          />
          <button type="submit" class="assistant-send">Send</button>
        </form>

        <div
          id="assistantSuggestions"
          class="assistant-suggestions"
          aria-label="Quick suggestions"
        ></div>
      </aside>
    </main>

    <script src="script.js"></script>
  </body>
</html>

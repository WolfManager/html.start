      <div class="home-layout">
        <aside
          class="side-panel weather-panel"
          aria-label="Local weather status"
        >
          <div class="weather-row">
            <span id="weatherIcon" class="weather-icon" aria-hidden="true"
              >&#9729;</span
            >
            <div>
              <p id="weatherTemp" class="weather-temp">--&#176;C</p>
              <p id="weatherSummary" class="weather-summary">
                Loading weather...
              </p>
            </div>
          </div>
          <p id="weatherLocation" class="weather-location">
            Detecting GPS location.
          </p>
          <div
            id="weatherForecast"
            class="weather-forecast"
            aria-label="7 day weather forecast"
          ></div>
        </aside>

        <section class="center-panel" aria-label="MAGNETO search">
          <section class="hero" aria-label="MAGNETO brand">
            <h1>Magneto</h1>
          </section>

          <section class="search-panel" aria-label="Search form">
            <form id="searchForm" class="search-form">
              <label for="searchQuery" class="sr-only"
                >What do you want to search?</label
              >
              <input
                id="searchQuery"
                name="q"
                type="search"
                placeholder="Type your search"
                enterkeyhint="search"
                maxlength="160"
                required
              />

              <button type="submit" class="search-btn">Search</button>
            </form>
            <p
              id="statusMessage"
              class="status"
              role="status"
              aria-live="polite"
            ></p>
          </section>
        </section>

        <aside
          class="side-panel right-panel"
          aria-label="MAGNETO suggestion assistant"
        >
          <p class="badge">MAGNETO Assistant</p>
          <div
            id="assistantThread"
            class="assistant-thread"
            aria-live="polite"
          ></div>

          <div
            id="assistantSuggestions"
            class="assistant-suggestions"
            aria-label="Assistant suggestions"
          ></div>

          <form id="assistantForm" class="assistant-form">
            <label for="assistantInput" class="sr-only"
              >Write a message to the assistant</label
            >
            <input
              id="assistantInput"
              type="text"
              placeholder="Ask anything..."
              maxlength="160"
              autocomplete="off"
            />
            <button type="submit" class="assistant-send">Send</button>
          </form>
        </aside>
      </div>
    </main>

    <script src="config.js?v=20260310a"></script>
    <script src="script.js?v=20260314o"></script>
  </body>
</html>

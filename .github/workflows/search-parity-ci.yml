name: Search Parity CI

on:
  workflow_run:
    workflows:
      - Django CI
    types:
      - completed
  workflow_dispatch:

jobs:
  search-parity-strict:
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      DJANGO_DEBUG: "true"
      DJANGO_SECRET_KEY: "ci-django-secret-key-1234567890-abcdef"
      ADMIN_USER: "admin"
      ADMIN_PASSWORD: "ci-admin-password-123"
      JWT_SECRET: "ci-jwt-secret-1234567890-abcdefghijklmnopqrstuvwxyz"
      SESSION_COOKIE_SECURE: "true"
      CSRF_COOKIE_SECURE: "true"
      PARITY_MODE: "strict"
      MAGNETO_NODE_BASE_URL: "http://127.0.0.1:3000"
      MAGNETO_DJANGO_BASE_URL: "http://127.0.0.1:8000"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Node dependencies
        run: npm ci

      - name: Install Django dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend-django/requirements.txt

      - name: Start Node and Django backends
        run: |
          node server.js > node-ci.log 2>&1 &
          python backend-django/manage.py runserver 127.0.0.1:8000 > django-ci.log 2>&1 &

      - name: Wait for services
        run: |
          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:3000/api/health > /dev/null && curl -fsS http://127.0.0.1:8000/api/health > /dev/null; then
              echo "Node and Django are healthy"
              exit 0
            fi
            sleep 2
          done
          echo "Services did not become healthy in time"
          exit 1

      - name: Run strict parity gate
        run: npm run search:parity:gate

      - name: Dump backend logs on failure
        if: failure()
        run: |
          echo "--- node-ci.log ---"
          cat node-ci.log || true
          echo "--- django-ci.log ---"
          cat django-ci.log || true
